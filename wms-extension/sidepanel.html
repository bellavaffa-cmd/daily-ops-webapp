<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Daily Ops</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #111; }
    iframe { width: 100%; height: 100%; border: none; display: block; }
  </style>
</head>
<body>
  <iframe id="appFrame"
          src="https://bellavaffa-cmd.github.io/daily-ops-webapp/"
          allow=""
          title="Daily Ops Dashboard"></iframe>

  <script>
    const frame   = document.getElementById('appFrame');
    const BASE_URL = 'https://bellavaffa-cmd.github.io/daily-ops-webapp/';

    // On load: pick up a pending scan URL stored before the panel opened
    chrome.storage.session.get('pendingScan', (result) => {
      if (result.pendingScan) {
        frame.src = result.pendingScan;
        chrome.storage.session.remove('pendingScan');
      }
    });

    // When the panel is already open: receive new scan URL directly
    chrome.runtime.onMessage.addListener((msg) => {
      if (msg.action === 'loadScan' && msg.url) {
        frame.src = msg.url;
      }
    });

    // After form submission the iframe posts wms-close-overlay —
    // navigate back to the main dashboard instead of closing the panel
    window.addEventListener('message', (e) => {
      if (e.data && e.data.type === 'wms-close-overlay') {
        frame.src = BASE_URL;
      }
    });
  </script>
</body>
</html>
